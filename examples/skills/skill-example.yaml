# 描述字段正例（creating-skills.md）
description: "用于需要网络研究的任何问题。提供系统化的多角度研究方法论，而非单一浅层搜索。适用：回答'什么是 X'、'解释 X'、'比较 X 和 Y'。不适用：简单的代码修改任务"

# 描述写作模板（creating-skills.md）
description: "[一句话说明核心能力]。提供：[该 Skill 包含的资源]。适用：[触发场景]。不适用：[边界场景]"

# 权限控制 — 只读审查 Skill（creating-skills.md）
name: code-reviewer
description: 代码审查专家，识别代码异味和安全漏洞
allowed-tools:
  - read      # 读取代码文件
  - glob      # 搜索文件
  - grep      # 搜索内容
  # 注意：没有 edit，禁止修改代码
  # 注意：没有 bash，禁止执行命令

# 作用域控制（creating-skills.md）
name: security-scanner
description: 安全漏洞扫描专家
target_agent: security-audit  # 只有 security-audit Agent 可见
allowed-tools:
  - read
  - grep
  - bash

# 完整元数据（creating-skills.md）
name: frontend-architect
description: 前端架构设计专家
license: MIT
metadata:
  version: "2.1.0"
  author: opencode-community
  tags:
    - frontend
