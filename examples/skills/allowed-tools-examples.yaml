# ✅ 好例子：只读审查 Skill
name: code-reviewer
allowed-tools:
  - Read
  - Glob
  - Grep
# Write 和 RunCommand 没出现——审查不需要改代码

# ❌ 差例子：权限过宽
name: code-reviewer
allowed-tools:
  - Read
  - Write
  - RunCommand
  - Glob
  - Grep
  - Edit
# Write 和 RunCommand 是多余的——增加了安全隐患

# ✅ 好例子：功能明确的 Skill
name: db-migration
allowed-tools:
  - Read
  - Write
  - RunCommand
# 迁移确实需要读写和执行命令，正当理由

# ❌ 差例子：安全升级
name: db-migration
allowed-tools:
  - Read
  - RunCommand
# 写了却没有声明 Write——"权限不足"的报错迟早会来，然后被迫改配置
# 不如一开始就诚实声明实际需要的权限
