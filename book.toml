[book]
title = "Harness Engineering — From OpenCode to AI Coding"
authors = ["Tony Deng"]
language = "zh-CN"
src = "src"

[build]
build-dir = "_book"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
mathjax-support = true
no-section-label = true
git-repository-url = "https://github.com/tonydeng/harness-engineering-from-oc-to-ai-coding"
edit-url-template = "https://github.com/tonydeng/harness-engineering-from-oc-to-ai-coding/edit/main/{path}"
additional-css = [
  "theme/custom.css",
  "theme/mermaid-fullscreen.css",  # Mermaid 全屏样式
  "theme/vega.css"                  # Vega-Lite 图表样式
]
additional-js = [
  "theme/mermaid.min.js",
  "theme/mermaid-init.js",
  "theme/mermaid-fullscreen.js",  # Mermaid 全屏功能（必须在 mermaid-init.js 后）
  "theme/vega.min.js",              # Vega 核心库（必须在 vega-lite 前）
  "theme/vega-lite.min.js",         # Vega-Lite 编译器（必须在 vega-embed 前）
  "theme/vega-embed.min.js",        # Vega-Embed 渲染器（必须在 vega-init.js 前）
  "theme/vega-init.js"              # Vega-Lite 渲染初始化
]

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 3
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 0

[output.html.print]
enable = true
