name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
      - 'd/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-mdbook-${{ hashFiles('**/book.toml') }}

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-mermaid
        shell: bash
        run: |
          if ! command -v mdbook-mermaid &> /dev/null; then
            cargo install mdbook-mermaid
          else
            echo "mdbook-mermaid already installed"
          fi

      - name: Check internal links
        run: |
          echo "Checking SUMMARY.md for broken link targets..."
          cd src && awk -F '[()]' '/\.md\)/ {print $2}' SUMMARY.md | while read f; do
            [ -f "$f" ] || echo "BROKEN LINK: $f (referenced in SUMMARY.md)"
          done && echo "All SUMMARY.md links OK"
      - name: Build mdBook
        run: mdbook build

      - name: HEDQ quick quality check
        run: python scripts/qa/run-hedq.py --quick --no-save || echo "HEDQ check completed (non-blocking)"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
