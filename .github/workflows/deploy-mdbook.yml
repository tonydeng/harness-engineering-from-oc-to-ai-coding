name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
      - 'd/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-mdbook-${{ hashFiles('**/book.toml') }}

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-mermaid
        shell: bash
        run: |
          if ! command -v mdbook-mermaid &> /dev/null; then
            cargo install mdbook-mermaid
          else
            echo "mdbook-mermaid already installed"
          fi

      - name: Check internal links
        run: |
          echo "Checking SUMMARY.md for broken link targets..."
          cd src && awk -F '[()]' '/\.md\)/ {print $2}' SUMMARY.md | while read f; do
            [ -f "$f" ] || echo "BROKEN LINK: $f (referenced in SUMMARY.md)"
          done && echo "All SUMMARY.md links OK"
      - name: Build mdBook
        run: mdbook build

      - name: HEDQ quick quality check
        env:
          HEDQ_THRESHOLD_WARN: ${{ vars.HEDQ_THRESHOLD_WARN || '60' }}
        run: |
          echo "Running HEDQ --quick quality check (threshold: ${HEDQ_THRESHOLD_WARN}%)..."
          RAW=$(python scripts/qa/run-hedq.py --quick --json --no-save 2>&1) || {
            echo "::warning title=HEDQ Check::Python script failed or not available"
            echo "${RAW}"
            exit 0
          }
          JSON=$(echo "${RAW}" | sed -n '/^{/,$p') || JSON=""
          if [ -z "${JSON}" ]; then
            echo "::warning title=HEDQ Check::Could not extract JSON from output"
            echo "${RAW}"
            exit 0
          fi
          SCORE=$(echo "${JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin)['total_score'])" 2>/dev/null) || {
            echo "::warning title=HEDQ Check::Could not parse JSON score"
            exit 0
          }
          PERCENTAGE=$(echo "${JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin)['percentage'])" 2>/dev/null)
          GRADE=$(echo "${JSON}" | python3 -c "import sys,json; print(json.load(sys.stdin)['grade'])" 2>/dev/null)
          echo "HEDQ Score: ${SCORE}/26 (${PERCENTAGE}%) → ${GRADE}"
          if [ "$(echo "${PERCENTAGE} < ${HEDQ_THRESHOLD_WARN}" | python3 -c "print(eval(input()))" 2>/dev/null)" = "True" ]; then
            echo "::warning title=HEDQ Check::Quality score ${PERCENTAGE}% is below threshold ${HEDQ_THRESHOLD_WARN}% — consider reviewing D6/D7 issues"
          else
            echo "✅ HEDQ score ${PERCENTAGE}% meets threshold ${HEDQ_THRESHOLD_WARN}%"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
